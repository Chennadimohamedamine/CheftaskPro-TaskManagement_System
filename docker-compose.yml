version: '3.8'

services:
  db:
    image: postgres:16
    container_name: taskflow-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_user -d taskflow_prod_db"]
      interval: 5s
      timeout: 5s
      retries: 5
